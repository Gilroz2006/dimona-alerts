<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצב נוכחי בדימונה</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-blue: #3b82f6;
            --success-green: #22c55e;
            --warning-yellow: #eab308;
            --orange-alert: #f97316;
            --danger-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
        }

        .header { margin-top: 40px; margin-bottom: 40px; }
        .header h1 { 
            margin: 0; 
            font-size: 2.8rem; 
            font-weight: 800; 
            color: white; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 60px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
            width: 340px;
        }

        .status-circle {
            width: 300px; height: 300px;
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 14px solid #334155;
            transition: all 0.6s ease;
            background: rgba(15, 23, 42, 0.6);
            padding: 30px;
            box-sizing: border-box;
        }

        #statusLabel { 
            font-weight: 800; 
            margin: 0; 
            line-height: 1.2; 
            width: 100%;
        }

        .percentage-label {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 15px;
            opacity: 0.9;
        }

        .status-red .status-circle { 
            animation: pulse-red 1.2s infinite; 
            border-color: var(--danger-red);
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .update-btn { 
            margin-top: 50px; 
            padding: 20px 60px; 
            border-radius: 50px; 
            border: none; 
            background: var(--primary-blue); 
            color: white; 
            font-size: 1.2rem; font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .update-btn:active { transform: scale(0.96); }

        .update-info { 
            margin-top: 35px; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 25px;
        }

        .footer { margin-top: 50px; color: #475569; font-size: 0.85rem; font-weight: 600; padding-bottom: 30px; }

        .status-green .status-circle { border-color: var(--success-green); }
        .status-yellow .status-circle { border-color: var(--warning-yellow); }
        .status-orange .status-circle { border-color: var(--orange-alert); }
    </style>
</head>
<body>

    <div class="header">
        <h1>מצב נוכחי בדימונה</h1>
    </div>

    <div id="mainCard" class="status-card">
        <div class="status-circle">
            <h2 id="statusLabel">טוען נתונים...</h2>
            <div id="percentLabel" class="percentage-label"></div>
        </div>
        
        <div class="update-info">
            עדכון אחרון: <span id="timeLabel">--:--:--</span>
        </div>
    </div>

    <button id="updateBtn" class="update-btn" onclick="triggerUpdate()">
        רענן מצב
    </button>

    <div class="footer">מערכת דיווח דימונה &copy; 2026</div>

    <script>
        const dbUrl = "https://dimonaalerts-default-rtdb.europe-west1.firebasedatabase.app/alert_status.json";

        function fetchData() {
            fetch(dbUrl)
                .then(res => res.json())
                .then(data => { if (data) updateUI(data); })
                .catch(err => console.error("Error:", err));
        }

        function updateUI(data) {
            const card = document.getElementById('mainCard');
            const label = document.getElementById('statusLabel');
            const percentLabel = document.getElementById('percentLabel');
            const timeLabel = document.getElementById('timeLabel');

            timeLabel.innerText = data.last_update || "00:00:00";
            card.className = "status-card";

            let text = "";
            let color = "";
            let percent = "";

            if (data.status === 'green') { 
                card.classList.add('status-green'); 
                text = "אין התרעות כרגע"; 
                color = "var(--success-green)"; 
                percent = "0%";
            } else if (data.status === 'yellow') { 
                card.classList.add('status-yellow'); 
                text = "לא פה כנראה"; 
                color = "var(--warning-yellow)"; 
                percent = "30%";
            } else if (data.status === 'orange') { 
                card.classList.add('status-orange'); 
                text = "סיכוי סביר שכאן, תתכוננו"; 
                color = "var(--orange-alert)"; 
                percent = "60%";
            } else if (data.status === 'red') { 
                card.classList.add('status-red'); 
                text = "תהיה אזעקה, תתמגנו"; 
                color = "var(--danger-red)"; 
                percent = "100%";
            }

            label.innerText = text;
            label.style.color = color;
            percentLabel.innerText = `(${percent})`;
            percentLabel.style.color = color;

            if (text.length > 20) { label.style.fontSize = "1.5rem"; }
            else { label.style.fontSize = "2rem"; }
        }

            function triggerUpdate() {
                const btn = document.getElementById('updateBtn');
                btn.disabled = true;
                btn.innerText = "מעדכן...";
                fetch("https://dimona-alerts-bot.onrender.com/health")
                    .then(() => {
                        setTimeout(() => {
                            fetchData();
                            btn.disabled = false;
                            btn.innerText = "רענן מצב";
                        }, 2500);
                    });
            }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
