<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דימונה LIVE | מצב העיר</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-blue: #3b82f6;
            --success-green: #22c55e;
            --warning-yellow: #eab308;
            --orange-alert: #f97316;
            --danger-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header p { margin: 0; color: var(--text-muted); font-weight: 500; font-size: 1.1rem; }
        .header h1 { margin: 5px 0 0; font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 1; color: white; }

        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px 30px;
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 340px;
            transition: all 0.5s ease;
        }

        .status-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 8px solid #334155;
            margin-bottom: 30px;
            transition: all 0.6s ease;
            background: rgba(15, 23, 42, 0.5);
        }

        /* רק באדום יש אנימציה */
        .status-red .status-circle { 
            animation: pulse-red 1.5s infinite; 
            border-color: var(--danger-red);
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #statusIcon { font-size: 4rem; display: none; } /* מוסתר כברירת מחדל */
        .status-red #statusIcon { display: block; } /* מוצג רק באדום */

        #statusLabel { font-size: 1.5rem; font-weight: 800; margin: 0; text-align: center; line-height: 1.4; min-height: 4rem; display: flex; align-items: center; }

        .update-btn { 
            margin-top: 40px; 
            padding: 20px 50px; 
            border-radius: 50px; 
            border: none; 
            background: var(--primary-blue); 
            color: white; 
            font-size: 1.2rem; font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .update-btn:active { transform: scale(0.96); }
        .update-btn:disabled { background: #475569; opacity: 0.6; }

        .update-info { 
            margin-top: 30px; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 25px;
        }
        
        .footer { margin-top: 50px; color: #475569; font-size: 0.8rem; font-weight: 600; }

        /* צבעים לפי סטטוס */
        .status-green .status-circle { border-color: var(--success-green); }
        .status-yellow .status-circle { border-color: var(--warning-yellow); }
        .status-orange .status-circle { border-color: var(--orange-alert); }
    </style>
</head>
<body>
    <div class="header">
        <p>המצב הנוכחי בעיר</p>
        <h1>דימונה</h1>
    </div>

    <div id="mainCard" class="status-card">
        <div class="status-circle">
            <div id="statusIcon">🚨</div>
        </div>
        <h2 id="statusLabel">טוען...</h2>
        
        <div class="update-info">
            עדכון אחרון: <span id="timeLabel">--:--:--</span>
        </div>
    </div>

    <button id="updateBtn" class="update-btn" onclick="triggerUpdate()">
        עדכן מצב עכשיו
    </button>

    <div class="footer">פותח ע"י גלבוע רוזיליו &copy; 2026</div>

    <script>
        const dbUrl = "https://dimonaalerts-default-rtdb.europe-west1.firebasedatabase.app/alert_status.json";

        function fetchData() {
            fetch(dbUrl)
                .then(res => res.json())
                .then(data => { if (data) updateUI(data); })
                .catch(err => console.error("Error:", err));
        }

        function updateUI(data) {
            const card = document.getElementById('mainCard');
            const label = document.getElementById('statusLabel');
            const timeLabel = document.getElementById('timeLabel');

            timeLabel.innerText = data.last_update || "00:00:00";
            card.className = "status-card";

            if (data.status === 'green') { 
                card.classList.add('status-green'); 
                label.innerText = "אין התרעות כרגע"; 
                label.style.color = "var(--success-green)"; 
            } else if (data.status === 'yellow') { 
                card.classList.add('status-yellow'); 
                label.innerText = "כנראה לא פה, עונג אפשר לצאת מהממ\"ד"; 
                label.style.color = "var(--warning-yellow)"; 
            } else if (data.status === 'orange') { 
                card.classList.add('status-orange'); 
                label.innerText = "אולי פה, לא מתחייב"; 
                label.style.color = "var(--orange-alert)"; 
            } else if (data.status === 'red') { 
                card.classList.add('status-red'); 
                label.innerText = "תכניסו את צ'אקו, תכף אזעקה"; 
                label.style.color = "var(--danger-red)"; 
            }
        }

        function triggerUpdate() {
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerText = "בודק...";

            fetch("https://dimona-alerts-bot.onrender.com/health")
                .then(() => {
                    setTimeout(() => {
                        fetchData();
                        btn.disabled = false;
                        btn.innerText = "עדכן מצב עכשיו";
                    }, 3000);
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerText = "נסה שוב";
                });
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
