<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצב נוכחי בדימונה</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-blue: #3b82f6;
            --success-green: #22c55e;
            --warning-yellow: #eab308;
            --orange-alert: #f97316;
            --danger-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
        }

        .header { margin-top: 40px; margin-bottom: 40px; }
        .header h1 { margin: 0; font-size: 2.5rem; font-weight: 800; color: white; }

        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
            width: 320px;
            transition: all 0.5s ease;
        }

        .status-circle {
            width: 280px; height: 280px;
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 12px solid #334155;
            transition: all 0.5s ease;
            background: rgba(15, 23, 42, 0.6);
        }

        #statusLabel { font-weight: 800; margin: 0; line-height: 1.2; }
        .percentage-label { font-size: 1.4rem; font-weight: 700; margin-top: 10px; opacity: 0.9; }

        /* --- אנימציות הבהוב --- */
        .status-red .status-circle { animation: pulse-red 0.6s infinite; border-color: var(--danger-red); }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); }
            70% { box-shadow: 0 0 0 35px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status-orange .status-circle { animation: pulse-orange 1.2s infinite; border-color: var(--orange-alert); }
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6); }
            70% { box-shadow: 0 0 0 25px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        .status-yellow .status-circle { animation: pulse-yellow 2s infinite; border-color: var(--warning-yellow); }
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }

        .status-green .status-circle { border-color: var(--success-green); }

        .update-btn { 
            margin-top: 40px; padding: 18px 50px; border-radius: 40px; border: none; 
            background: var(--primary-blue); color: white; font-size: 1.1rem; font-weight: 700; 
            cursor: pointer; box-shadow: 0 10px 15px rgba(59, 130, 246, 0.3);
        }

        .update-info { 
            margin-top: 30px; font-size: 0.85rem; color: var(--text-muted); 
            background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px;
        }

        .footer { margin-top: 40px; color: #475569; font-size: 0.85rem; font-weight: 600; padding-bottom: 20px; }
        .disclaimer { font-size: 0.75rem; margin-bottom: 8px; color: #64748b; font-weight: 400; }
    </style>
</head>
<body>

    <div class="header">
        <h1>מצב נוכחי בדימונה</h1>
    </div>

    <div id="mainCard" class="status-card">
        <div class="status-circle">
            <h2 id="statusLabel">טוען...</h2>
            <div id="percentLabel" class="percentage-label"></div>
        </div>
        <div class="update-info">עדכון אחרון: <span id="timeLabel">--:--:--</span></div>
    </div>

    <button id="updateBtn" class="update-btn" onclick="triggerUpdate()">רענן מצב</button>

    <div class="footer">
        <div class="disclaimer">אין באמור התחייבות רשמית, יש להתייחס להתרעות פיקוד העורף בלבד</div>
        <div>פותח ע"י גלבוע רוזיליו &copy; 2026</div>
    </div>

    <script>
        const dbUrl = "https://dimonaalerts-default-rtdb.europe-west1.firebasedatabase.app/alert_status.json";
        let lastKnownStatus = 'green';
        let vibrationInterval = null;
        let vibrationTimeout = null;

        function stopVibration() {
            if (vibrationInterval) {
                clearInterval(vibrationInterval);
                vibrationInterval = null;
            }
            if (vibrationTimeout) {
                clearTimeout(vibrationTimeout);
                vibrationTimeout = null;
            }
            if ("vibrate" in navigator) navigator.vibrate(0);
        }

        function handleVibration(status) {
            stopVibration(); 
            if (!("vibrate" in navigator) || status === 'green') return;

            let pattern = 0;
            let intervalMs = 0;

            if (status === 'red') {
                pattern = 300; 
                intervalMs = 600; // סה"כ מחזור של 0.6s
            } else if (status === 'orange') {
                pattern = 600; 
                intervalMs = 1200; // סה"כ מחזור של 1.2s
            } else if (status === 'yellow') {
                pattern = 1000; 
                intervalMs = 2000; // סה"כ מחזור של 2.0s (פעימות ארוכות ואיטיות)
            }

            // הפעלה ראשונית
            navigator.vibrate(pattern);
            
            // לולאת רטט
            vibrationInterval = setInterval(() => {
                navigator.vibrate(pattern);
            }, intervalMs);

            // עצירה אוטומטית אחרי 8 שניות
            vibrationTimeout = setTimeout(stopVibration, 8000);
        }

        function fetchData() {
            fetch(dbUrl)
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        const card = document.getElementById('mainCard');
                        const label = document.getElementById('statusLabel');
                        const percentLabel = document.getElementById('percentLabel');
                        const timeLabel = document.getElementById('timeLabel');

                        timeLabel.innerText = data.last_update || "00:00:00";
                        card.className = "status-card";

                        if (data.status !== lastKnownStatus) {
                            handleVibration(data.status);
                        }

                        if (data.status === 'green') {
                            card.classList.add('status-green');
                            label.innerText = "אין התרעות כרגע 🟢";
                            label.style.color = "var(--success-green)";
                            percentLabel.innerText = "(0%)";
                        } else if (data.status === 'yellow') {
                            card.classList.add('status-yellow');
                            label.innerText = "⚠️ כוננות - מטח רחוק";
                            label.style.color = "var(--warning-yellow)";
                            percentLabel.innerText = "(45%)";
                        } else if (data.status === 'orange') {
                            card.classList.add('status-orange');
                            label.innerText = "❗ דריכות גבוהה - מטח קרוב";
                            label.style.color = "var(--orange-alert)";
                            percentLabel.innerText = "(80%)";
                        } else if (data.status === 'red') {
                            card.classList.add('status-red');
                            label.innerText = "🚨 סכנה מיידית - תתמגנו";
                            label.style.color = "var(--danger-red)";
                            percentLabel.innerText = "(100%)";
                        }

                        lastKnownStatus = data.status;
                        
                        if (label.innerText.length > 20) { label.style.fontSize = "1.3rem"; }
                        else { label.style.fontSize = "1.8rem"; }
                    }
                })
                .catch(err => console.error("Error:", err));
        }

        function triggerUpdate() {
            const btn = document.getElementById('updateBtn');
            btn.innerText = "מעדכן...";
            if ("vibrate" in navigator) navigator.vibrate(50); 
            fetch("https://dimona-alerts-bot.onrender.com/health")
                .then(() => setTimeout(() => { fetchData(); btn.innerText = "רענן מצב"; }, 2500));
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
